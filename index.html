<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HabitStakes</title>

  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#111111">

  <link rel="stylesheet" href="./style.css" />

  <!-- Supabase JS (ESM) -->
  <script type="module" src="./app.js"></script>
</head>
<body>
  <div class="container">
    <h1>🔥 HabitStakes</h1>

    <div id="topbar" class="topbar hidden"></div>

    <div id="messages"></div>

    <!-- Auth -->
    <div id="auth" class="card">
      <h2>Login / Register</h2>
      <input id="email" type="email" placeholder="Email">
      <input id="password" type="password" placeholder="Password">
      <input id="username" placeholder="Username (register only)">
      <div class="row">
        <button id="btnLogin">Login</button>
        <button id="btnRegister">Register</button>
      </div>
    </div>

    <!-- App -->
    <div id="app" class="hidden">
      <div class="card">
        <h2>Add Habit</h2>
        <input id="habitName" placeholder="Habit name">
        <input id="habitStake" type="number" step="0.01" placeholder="Stake">
        <button id="btnAddHabit">Add</button>
      </div>

      <div class="card">
        <h2>Habits</h2>
        <table id="habitsTable">
          <thead><tr><th>Name</th><th>Stake</th><th>Streak</th><th>Actions</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="card">
        <h2>🏆 Leaderboard</h2>
        <table id="leaderboard">
          <thead><tr><th>User</th><th>Level</th><th>XP</th><th>Balance</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js");
    }
  </script>
</body>
</html>
